spring:
  application:
    name: spring-ai-web

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-5

    mcp:
      client:
        streamable-http:
          connections:
            server:
              url: http://localhost:8081

server:
  port: 8080
